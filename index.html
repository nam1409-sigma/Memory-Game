<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory Match Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     CSS CUSTOM PROPERTIES — Tweak the look here
  ============================================================ */
  :root {
    --bg-deep:    #0a0c1a;
    --bg-mid:     #10132a;
    --glass:      rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --neon-a:     #6c63ff;   /* purple */
    --neon-b:     #00d4ff;   /* cyan   */
    --neon-c:     #ff6bcb;   /* pink   */
    --gold:       #ffd86b;
    --text:       #e8eaf6;
    --text-dim:   #7b82b4;
    --card-back:  #1c1f3a;
    --card-radius: 16px;
    --flip-dur:   0.55s;
  }

  /* ============================================================
     RESET & BASE
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(108,99,255,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0,212,255,0.14) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,107,203,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    animation: orb-drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 400px; height: 400px; background: var(--neon-a); top: -100px; left: -100px; animation-delay: 0s; }
  .orb-2 { width: 300px; height: 300px; background: var(--neon-b); bottom: -80px; right: -80px; animation-delay: -4s; }
  .orb-3 { width: 250px; height: 250px; background: var(--neon-c); top: 40%; left: 60%; animation-delay: -8s; }

  @keyframes orb-drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* ============================================================
     LAYOUT WRAPPER
  ============================================================ */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 16px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ============================================================
     HUD — score / moves / controls
  ============================================================ */
  .hud {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    width: 100%;
  }

  .stat-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    padding: 12px 22px;
    text-align: center;
    min-width: 100px;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }

  .stat-value.matches { color: var(--neon-b); }
  .stat-value.moves   { color: var(--neon-c); }

  .hud-controls {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  .btn {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    outline: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:active { transform: scale(0.95); }

  .btn-restart {
    background: linear-gradient(135deg, var(--neon-a), #9b72ff);
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,99,255,0.45);
  }
  .btn-restart:hover { box-shadow: 0 6px 28px rgba(108,99,255,0.65); transform: translateY(-2px); }

  .btn-mute {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    color: var(--text);
    backdrop-filter: blur(8px);
    font-size: 18px;
    padding: 10px 14px;
  }
  .btn-mute:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
  .btn-mute.muted { color: var(--text-dim); }

  /* ============================================================
     CARD GRID
  ============================================================ */
  .grid {
    display: grid;
    /* Default 4×4; JS will update grid-template-columns if size changes */
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 680px;
  }

  /* ---- Card Shell ---- */
  .card {
    aspect-ratio: 3/4;
    perspective: 900px;
    cursor: pointer;
    user-select: none;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform var(--flip-dur) cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--card-radius);
  }

  .card.flipped .card-inner   { transform: rotateY(180deg); }
  .card.matched .card-inner   { transform: rotateY(180deg); }

  /* Matched glow pulse */
  .card.matched .card-face-front {
    box-shadow: 0 0 0 2px var(--neon-b), 0 0 24px rgba(0,212,255,0.5);
    animation: match-pulse 1.6s ease-in-out infinite;
  }
  @keyframes match-pulse {
    0%, 100% { box-shadow: 0 0 0 2px var(--neon-b), 0 0 18px rgba(0,212,255,0.4); }
    50%       { box-shadow: 0 0 0 3px var(--neon-b), 0 0 36px rgba(0,212,255,0.7); }
  }

  /* Shared face styles */
  .card-face-front,
  .card-face-back {
    position: absolute;
    inset: 0;
    border-radius: var(--card-radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* ---- BACK FACE ---- */
  .card-face-back {
    background: var(--card-back);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }
  .card:not(.flipped):not(.matched):hover .card-face-back {
    transform: scale(1.03);
    border-color: rgba(255,255,255,0.22);
  }

  /* Decorative back pattern */
  .card-face-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        45deg,
        rgba(108,99,255,0.08) 0px,
        rgba(108,99,255,0.08) 1px,
        transparent 1px,
        transparent 18px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(0,212,255,0.06) 0px,
        rgba(0,212,255,0.06) 1px,
        transparent 1px,
        transparent 18px
      );
  }

  .card-back-symbol {
    font-size: clamp(22px, 5vw, 36px);
    z-index: 1;
    filter: drop-shadow(0 0 10px rgba(108,99,255,0.7));
    animation: float-symbol 3s ease-in-out infinite;
  }
  @keyframes float-symbol {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-4px); }
  }

  /* ---- FRONT FACE ---- */
  .card-face-front {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1e2148 0%, #161933 100%);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
  }

  /* Image cards */
  .card-face-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: calc(var(--card-radius) - 4px);
  }

  /* Emoji cards */
  .card-emoji {
    font-size: clamp(28px, 7vw, 52px);
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
  }

  /* ============================================================
     VICTORY MODAL
  ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 10, 26, 0.85);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .modal-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: linear-gradient(160deg, #1a1e3a 0%, #0f1225 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 28px;
    padding: 44px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    transform: scale(0.85) translateY(24px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.visible .modal { transform: scale(1) translateY(0); }

  .modal-trophy {
    font-size: 64px;
    margin-bottom: 16px;
    display: block;
    animation: trophy-bounce 1.2s ease-in-out infinite;
  }
  @keyframes trophy-bounce {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50%       { transform: translateY(-10px) rotate(3deg); }
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold), var(--neon-c));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .modal-sub {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 28px;
  }

  .modal-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-bottom: 32px;
  }

  .modal-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 24px;
    flex: 1;
  }
  .modal-stat .stat-label { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); }
  .modal-stat .stat-value { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }

  .btn-play-again {
    background: linear-gradient(135deg, var(--neon-b), var(--neon-a));
    color: #fff;
    font-size: 16px;
    padding: 16px 40px;
    border-radius: 16px;
    box-shadow: 0 6px 28px rgba(0,212,255,0.4);
    width: 100%;
    justify-content: center;
    letter-spacing: 1px;
  }
  .btn-play-again:hover {
    box-shadow: 0 8px 36px rgba(0,212,255,0.6);
    transform: translateY(-3px);
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
  }

  /* ============================================================
     RESPONSIVE
  ============================================================ */
  @media (max-width: 500px) {
    .grid { gap: 10px; }
    .hud { gap: 8px; }
    .stat-card { padding: 10px 14px; min-width: 80px; }
    .stat-value { font-size: 22px; }
    .modal { padding: 32px 24px; }
  }
</style>
</head>

<body>

<!-- Decorative background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Confetti canvas (shown on victory) -->
<canvas id="confetti-canvas"></canvas>

<!-- Victory Modal -->
<div class="modal-overlay" id="victoryModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <span class="modal-trophy" role="img" aria-label="Trophy">🏆</span>
    <h2 id="modalTitle">You Won!</h2>
    <p class="modal-sub">All pairs matched. Brilliant memory!</p>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="stat-label">MATCHES</div>
        <div class="stat-value matches" id="modalMatches">0</div>
      </div>
      <div class="modal-stat">
        <div class="stat-label">MOVES</div>
        <div class="stat-value moves" id="modalMoves">0</div>
      </div>
    </div>
    <button class="btn btn-play-again" id="btnPlayAgain">🔄 Play Again</button>
  </div>
</div>

<!-- ============================================================
     MAIN WRAPPER
============================================================ -->
<div class="wrapper">

  <!-- HUD -->
  <div class="hud">
    <div class="stat-card">
      <div class="stat-label">Matches</div>
      <div class="stat-value matches" id="matchCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Moves</div>
      <div class="stat-value moves" id="moveCount">0</div>
    </div>
    <div class="hud-controls">
      <button class="btn btn-restart" id="btnRestart" aria-label="Restart game">↺ Restart</button>
      <button class="btn btn-mute" id="btnMute" aria-label="Toggle sound">🔊</button>
    </div>
  </div>

  <!-- Card Grid -->
  <div class="grid" id="cardGrid" role="list" aria-label="Memory card grid"></div>



</div><!-- /.wrapper -->


<script>
/* ============================================================
   ██████████████████████████████████████████████████████████
   █                                                        █
   █   GAME ASSETS — Edit this object to customize!        █
   █                                                        █
   ██████████████████████████████████████████████████████████

   images  : 8 entries (emoji or image URL). One per pair.
   sounds  : URLs to audio files, or null to silence.
   totalPairs: must match the number of images you provide.
============================================================ */
const gameAssets = {

  /* --- Card images (emoji or URL) ---
     Replace with your own URLs like:
     "https://picsum.photos/seed/cat/200/260"
     or local paths: "./img/cat.jpg"                       */
  images: [
    "da.jpg",    // pair 1
    "hieu.jpg",  // pair 2
    "kp.jpg",    // pair 3
    "mh.jpg",    // pair 4
    "phuc.jpg",  // pair 5
    "qduc.jpg",  // pair 6
    "qh.jpg",    // pair 7
    "tung.jpg",  // pair 8
  ],

  /* --- Sounds ---
     Replace null with a URL or file path to enable audio.
     Example: flip: "./sounds/flip.mp3"
     The game uses Web Audio API beeps as built-in fallback. */
  sounds: {
    flip:      null,   // ← replace with your flip sound URL
    match:     null,   // ← replace with your match sound URL
    mismatch:  null,   // ← replace with your mismatch sound URL
  },

  /* --- Grid size ---
     Must equal gameAssets.images.length (at minimum).
     Also update CSS .grid → grid-template-columns if columns change. */
  totalPairs: 8,
};

/* ============================================================
   AUDIO ENGINE — Web Audio API fallback beeps
============================================================ */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let isMuted = localStorage.getItem('memoryMuted') === 'true';

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

/* Play a beep using Web Audio API */
function playBeep(frequency, duration, type = 'sine', gain = 0.18) {
  if (isMuted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(frequency, ctx.currentTime);
    gainNode.gain.setValueAtTime(gain, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) { /* audio not supported */ }
}

/* Play from URL or fallback to beep */
function playSound(key) {
  if (isMuted) return;
  const url = gameAssets.sounds[key];
  if (url) {
    const audio = new Audio(url);
    audio.play().catch(() => {});
  } else {
    // Built-in beeps
    if (key === 'flip')     playBeep(520,  0.12, 'sine',     0.14);
    if (key === 'match')    { playBeep(660, 0.1, 'triangle', 0.16); setTimeout(()=>playBeep(880,0.18,'triangle',0.16),110); }
    if (key === 'mismatch') playBeep(220, 0.25, 'sawtooth', 0.12);
  }
}

/* ============================================================
   GAME STATE
============================================================ */
let cards         = [];    // DOM card elements
let flippedCards  = [];    // currently face-up (unmatched)
let matchCount    = 0;
let moveCount     = 0;
let lockBoard     = false; // prevent clicks during check

/* ============================================================
   BUILD / SHUFFLE DECK
============================================================ */
function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildDeck() {
  const pairs = gameAssets.images.slice(0, gameAssets.totalPairs);
  const doubled = [...pairs, ...pairs];
  return shuffle(doubled);
}

/* ============================================================
   RENDER GRID
============================================================ */
function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  cards = [];
  const deck = buildDeck();

  deck.forEach((image, index) => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.setAttribute('role', 'listitem');
    card.setAttribute('aria-label', `Card ${index + 1}, face down`);
    card.dataset.image = image;
    card.tabIndex = 0;

    const isEmoji = !image.startsWith('http') && !image.startsWith('./') && !image.startsWith('/') && !image.endsWith('.jpg') && !image.endsWith('.png') && !image.endsWith('.webp');

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face-back">
          <span class="card-back-symbol" aria-hidden="true">✦</span>
        </div>
        <div class="card-face-front">
          ${isEmoji
            ? `<span class="card-emoji" role="img" aria-label="${image}">${image}</span>`
            : `<img src="${image}" alt="Card image" loading="lazy" />`
          }
        </div>
      </div>
    `;

    card.addEventListener('click', () => onCardClick(card));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') onCardClick(card); });

    grid.appendChild(card);
    cards.push(card);
  });
}

/* ============================================================
   CARD CLICK HANDLER
============================================================ */
function onCardClick(card) {
  // Guard: board locked, already matched, or already flipped
  if (lockBoard) return;
  if (card.classList.contains('matched')) return;
  if (card.classList.contains('flipped')) return;

  // Resume audio context on first interaction (browser policy)
  if (AudioCtx) getAudioCtx().resume().catch(()=>{});

  playSound('flip');
  card.classList.add('flipped');
  card.setAttribute('aria-label', `Card showing ${card.dataset.image}`);
  flippedCards.push(card);

  if (flippedCards.length === 2) {
    moveCount++;
    updateHUD();
    lockBoard = true;
    checkMatch();
  }
}

/* ============================================================
   MATCH CHECK
============================================================ */
function checkMatch() {
  const [a, b] = flippedCards;
  const isMatch = a.dataset.image === b.dataset.image;

  if (isMatch) {
    playSound('match');
    a.classList.add('matched');
    b.classList.add('matched');
    a.setAttribute('aria-label', `Matched: ${a.dataset.image}`);
    b.setAttribute('aria-label', `Matched: ${b.dataset.image}`);
    matchCount++;
    updateHUD();
    flippedCards = [];
    lockBoard = false;

    if (matchCount === gameAssets.totalPairs) {
      setTimeout(showVictory, 500);
    }
  } else {
    playSound('mismatch');
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      a.setAttribute('aria-label', 'Card face down');
      b.setAttribute('aria-label', 'Card face down');
      flippedCards = [];
      lockBoard = false;
    }, 820);
  }
}

/* ============================================================
   HUD UPDATE
============================================================ */
function updateHUD() {
  document.getElementById('matchCount').textContent = matchCount;
  document.getElementById('moveCount').textContent  = moveCount;
  // Animate bump
  ['matchCount','moveCount'].forEach(id => {
    const el = document.getElementById(id);
    el.style.transform = 'scale(1.35)';
    setTimeout(() => el.style.transform = 'scale(1)', 200);
  });
}

/* ============================================================
   VICTORY
============================================================ */
function showVictory() {
  document.getElementById('modalMatches').textContent = matchCount;
  document.getElementById('modalMoves').textContent   = moveCount;
  document.getElementById('victoryModal').classList.add('visible');
  launchConfetti();
}

function hideVictory() {
  document.getElementById('victoryModal').classList.remove('visible');
}

/* ============================================================
   RESTART
============================================================ */
function restartGame() {
  hideVictory();
  stopConfetti();
  matchCount   = 0;
  moveCount    = 0;
  flippedCards = [];
  lockBoard    = false;
  updateHUD();
  // Animate grid out then back
  const grid = document.getElementById('cardGrid');
  grid.style.opacity = '0';
  grid.style.transform = 'scale(0.95)';
  setTimeout(() => {
    renderGrid();
    grid.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
    grid.style.opacity = '1';
    grid.style.transform = 'scale(1)';
    setTimeout(() => { grid.style.transition = ''; }, 400);
  }, 250);
}

/* ============================================================
   MUTE TOGGLE
============================================================ */
function updateMuteUI() {
  const btn = document.getElementById('btnMute');
  btn.textContent = isMuted ? '🔇' : '🔊';
  btn.classList.toggle('muted', isMuted);
  btn.setAttribute('aria-label', isMuted ? 'Unmute sounds' : 'Mute sounds');
}

document.getElementById('btnMute').addEventListener('click', () => {
  isMuted = !isMuted;
  localStorage.setItem('memoryMuted', isMuted);
  updateMuteUI();
});

/* ============================================================
   CONFETTI (pure canvas)
============================================================ */
let confettiRAF  = null;
let confettiPieces = [];

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#6c63ff','#00d4ff','#ff6bcb','#ffd86b','#ff8c42','#7fff7f'];

  confettiPieces = Array.from({ length: 120 }, () => ({
    x:  Math.random() * W,
    y:  Math.random() * H - H,
    w:  6 + Math.random() * 8,
    h:  4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.12,
    vx: (Math.random() - 0.5) * 2.5,
    vy: 2.5 + Math.random() * 3.5,
    alpha: 1,
  }));

  function draw() {
    ctx.clearRect(0, 0, W, H);
    confettiPieces.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x   += p.vx;
      p.y   += p.vy;
      p.rot += p.rotV;
      if (p.y > H * 0.7) p.alpha -= 0.015;
    });
    confettiPieces = confettiPieces.filter(p => p.alpha > 0);
    if (confettiPieces.length > 0) confettiRAF = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, W, H);
  }
  draw();
}

function stopConfetti() {
  if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}
